name: Deploy site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Quartz uses git history for page "last modified" dates
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install Quartz dependencies
        working-directory: site
        run: npm ci
      - name: Regenerate dashboard + index
        run: node scripts/build-dashboard.mjs
      - name: Build site (content = repo root)
        working-directory: site
        run: npx quartz build -d ..
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
